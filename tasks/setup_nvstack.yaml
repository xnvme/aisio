---
doc: |
  Install the NVIDIA driver + CUDA toolkit on Ubuntu 26.04 (no GDS/DOCA)

  The NVIDIA mirror of setup_amdstack: the minimal driver + CUDA toolkit for
  NVMe<->GPU P2P, the open-kernel-module driver and the toolkit straight from
  apt. Deliberately NOT installed: MLNX_OFED, nvidia-gds / nvidia-peermem,
  nvidia-fs, the BAM kernel-source build, and cuda-samples; AiSIO drives
  GPU-initiated NVMe I/O over the open udmabuf-import path, not the proprietary
  GPUDirect-Storage / DOCA / BaM stack.

  Unlike setup_amdstack (amdgpu is in-tree), the NVIDIA driver is a DKMS module, so
  this reboots once to load it. On Ubuntu 26.04 the driver is 580-open from the
  distro 'restricted' repo; CUDA comes from NVIDIA's ubuntu2604 repo, which
  publishes only CUDA 13 (no 12.x) -- CUDA 13 satisfies xNVMe's '>=12.8'. CUDA
  installs under /usr/local/cuda-13.x; a /usr/local/cuda symlink and a
  /etc/profile.d/cuda.sh are wired up (non-interactive SSH still needs PATH set
  explicitly, as the build does).

  Run against a target whose default transport has root (e.g. via root_unlock):

    cijoe tasks/setup_nvstack.yaml --config configs/<target>.toml

steps:
- name: driver
  run: |
    apt-get -qy update
    DEBIAN_FRONTEND=noninteractive apt-get -qy install nvidia-driver-580-open

- name: reboot
  run: reboot

- name: wait_down
  uses: core.wait_for_transport
  with:
    state: down
    timeout: 90

- name: wait_up
  uses: core.wait_for_transport
  with:
    state: up
    timeout: 300

- name: cuda_repo
  run: |
    wget -qO /tmp/cuda-keyring.deb https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2604/x86_64/cuda-keyring_1.1-1_all.deb
    dpkg -i /tmp/cuda-keyring.deb
    apt-get -qy update

- name: cuda
  run: |
    DEBIAN_FRONTEND=noninteractive apt-get -qy install cuda-toolkit-13
    ln -sfn "$(ls -d /usr/local/cuda-13* | sort -V | tail -1)" /usr/local/cuda

- name: cuda_profile
  run: |
    echo 'export PATH=/usr/local/cuda/bin:$PATH' | tee /etc/profile.d/cuda.sh
    echo 'export LD_LIBRARY_PATH=/usr/local/cuda/lib64:$LD_LIBRARY_PATH' | tee -a /etc/profile.d/cuda.sh
    chmod +x /etc/profile.d/cuda.sh

- name: check_gpu
  run: |
    nvidia-smi --query-gpu=name,compute_cap,driver_version,memory.total --format=csv,noheader

- name: check_toolkit
  run: |
    /usr/local/cuda/bin/nvcc --version | grep release

- name: check_libs
  run: |
    ldconfig -p | grep -iE "libcudart|libcuda\.so"

# the CUDA driver-api header the host stack builds against
- name: check_cuda_header
  run: |
    ls -l /usr/local/cuda/include/cuda.h
