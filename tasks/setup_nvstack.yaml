doc: |
  Ubuntu 24.04 Setup of the NVIDIA Software Stack
  ===============================================

  This workflow provisions a system with the NVIDIA software stack required for
  NVMe <-> GPU development, testing, and experimentation. It targets the following
  components and versions:

  * Ubuntu Server 24.04.3
  * Linux 6.8 GA kernel (HWE must be disabled)
  * NVIDIA Open Kernel Modules (NOKM) v570 (via apt)
  * CUDA Toolkit v12.8 (via apt)
  * CUDA Samples v12.8 (from source)
  * MLNX_OFED 24.10-3.2.5.0 (via .run installer)
      - DOCA_OFED does not include NVMe or GDS support
  * nvidia-fs (via apt)

  The workflow also configures `PATH` and `LD_LIBRARY_PATH` to include the CUDA
  toolkit.

  Version information comes from two places:
  * Apt repositories provide the minor versions of NOKM and CUDA.
  * Major versions are fixed in the workflow itself and do not change automatically.

  This workflow does *not* install Ubuntu. Instead, it assumes a clean Ubuntu Server
  24.04.3 installation prepared with the selections shown below.

  Base Ubuntu Installation
  ------------------------
  During installation, ensure the following:

  * Kernel selection:
      (X) GA Kernel
      ( ) HWE Kernel  ← must be disabled

  * Installation Base:
      (X) Ubuntu Server
      ( ) Ubuntu Server (minimized)

  * Storage (guided):
      (X) Use an entire disk
      [ ] Set up this disk as an LVM group

  * Profile:
      - Your name: Odus | sudO
      - Server name: aisio-nvstack-01
      - Username: odus
      - Password: <choose>

  * SSH configuration:
      [X] Install OpenSSH server

  Required Manual Steps Before Running the Workflow
  -------------------------------------------------
  To allow CIJOE to execute commands as `root`, enable SSH root login:

      sudo passwd root
      sudo sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
      sudo systemctl restart ssh

  Perform these steps only on a development machine, as enabling root SSH access
  reduces system security.

  Running the Workflow
  --------------------
  After installing Ubuntu and enabling root SSH access, run:

      cijoe --monitor \
        -c configs/transport.toml \
        -c configs/nvstack.toml \
        tasks/setup_nvstack.yaml

  Make sure `transport.toml` contains the correct hostname and login credentials
  for the root user.

  Caveat: CUDA Environment
  ------------------------
  CUDA is not installed in standard system locations. The workflow installs a
  helper script in `/etc/profile.d/cuda.sh` that sets the CUDA environment for
  interactive shells.

  However, non-interactive shells (including many CIJOE operations) do *not*
  automatically source `/etc/profile.d/`. The workflow therefore explicitly
  updates `/root/.bashrc` so that CUDA tools (e.g., `nvcc`) work when executing
  over SSH.

steps:
- name: directories
  run: |
    mkdir -p {git,workdir}

- name: disable_upgrades
  run: |
    systemctl stop unattended-upgrades || true
    systemctl disable unattended-upgrades || true
    systemctl mask unattended-upgrades || true
    apt-get remove unattended-upgrades || true

- name: packages
  run: |
    apt-get -qy update && apt-get -qy upgrade
    apt-get -qy install build-essential linux-headers-$(uname -r) linux-tools-common linux-tools-$(uname -r) wget git htop vim cmake stress-ng parallel sysstat time
    apt-get -qy autoremove

- name: blacklist_nouveau
  run: |
    echo "blacklist nouveau" | tee /etc/modprobe.d/disable-nouveau.conf
    echo "options nouveau modeset=0" | tee -a /etc/modprobe.d/disable-nouveau.conf
    update-initramfs -u

- name: ofed
  run: |
    wget -O workdir/ofed.tgz {{ config.nvidia.ofed.url }}
    cd workdir; tar xzf ofed.tgz
    cd workdir/MLNX*; ./mlnxofedinstall --with-nvmf --with-nfsrdma --enable-gds --add-kernel-support --dkms
    update-initramfs -u -k $(uname -r)

- name: reboot
  run: shutdown -r now

- name: wait_down
  uses: core.wait_for_transport
  with:
    state: down
    timeout: 60

- name: wait_up
  uses: core.wait_for_transport
  with:
    state: up
    timeout: 300

- name: gpu_driver
  run: |
    apt-get install -y nvidia-driver-570-server-open

# Build NVIDIA kernel source tree to generate symbols/headers required by libnvm / BAM (not done
# automatically by DKMS)
- name: gpu_driver_kernel_source
  run: |
    cd /usr/src/nvidia-*570*/ && make -j

- name: reboot_driver
  run: shutdown -r now

- name: wait_down_driver
  uses: core.wait_for_transport
  with:
    state: down
    timeout: 60

- name: wait_up_driver
  uses: core.wait_for_transport
  with:
    state: up
    timeout: 300

- name: apt_repos
  run: |
    wget -O workdir/cuda_keyring.deb {{ config.nvidia.keyring.url }}
    dpkg -i workdir/cuda_keyring.deb
    wget -O /etc/apt/preferences.d/cuda-repository-pin-600 https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-ubuntu2404.pin
    apt-get update

- name: cuda
  run: |
    apt-get install -y cuda-toolkit-12-8

# Setup CUDA for all interactive shells via '/etc/profile.d' and source this it explicitly for
# 'root' via /root/.bashrc for non-interactive use of CUDA via e.g. ssh
- name: cuda_profile
  run: |
    echo '# CUDA environment variables (set by setup script)' | tee /etc/profile.d/cuda.sh
    echo 'export PATH=/usr/local/cuda/bin:$PATH' | tee -a /etc/profile.d/cuda.sh
    echo 'export LD_LIBRARY_PATH=/usr/local/cuda/lib64:$LD_LIBRARY_PATH' | tee -a /etc/profile.d/cuda.sh
    chmod +x /etc/profile.d/cuda.sh
    grep -qF 'SSH_CONNECTION' /root/.bashrc || sed -i '1i if [ -n "$SSH_CONNECTION" ] && [ -f /etc/profile.d/cuda.sh ]; then\n    . /etc/profile.d/cuda.sh\nfi\n' /root/.bashrc

- name: cuda_check
  run: |
    nvcc --version || true
    nvidia-smi || true

# Grabbing these from source as to make them writable
- name: cuda_samples
  run: |
    git clone https://github.com/NVIDIA/cuda-samples.git git/cuda-samples
    cd git/cuda-samples; git checkout v12.8
    mkdir git/cuda-samples/build

- name: nvidia_gds
  run: |
    apt-get install -y nvidia-gds-12-8

- name: checkup
  run: |
    lsmod | grep nvidia
    nvidia-smi || true
    dmesg | grep -i nvidia

# Quick way to verify thermals on the GPU
- name: gpu_burn
  run: |
    git clone https://github.com/wilicc/gpu-burn.git git/gpu-burn
    cd git/gpu-burn; make
    cd git/gpu-burn; ./gpu_burn -d 60
