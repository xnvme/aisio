doc: |
  AiSIO PoC Setup using the NVIDIA Software-Stack
  ===============================================

  Assuming you installed the system along the lines of the 'setup_nvstack.yaml'.

  With the above in place then run this workflow e.g.

    cijoe --monitor \
      -c configs/transport.toml \
      -c configs/aisio.toml \
      tasks/setup_aisio.yaml

  Adjusting transport.toml with the hostname and ssh-login info of the root user.

steps:
- name: fetch_sources
  uses: core.repository_prep

- name: gcc
  run: |
    apt-get -fy install gcc-12 g++-12
    update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-12 120 --slave /usr/bin/g++ g++ /usr/bin/g++-12
    update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 130 --slave /usr/bin/g++ g++ /usr/bin/g++-13
    update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-12 120 --slave /usr/bin/g++ g++ /usr/bin/g++-12
    update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 130 --slave /usr/bin/g++ g++ /usr/bin/g++-13
    update-alternatives --set gcc /usr/bin/gcc-12
    gcc --version
    g++ --version

- name: bam
  run: |
    rm -r "{{ config.bam.repository.path }}/builddir" || true
    mkdir -p "{{ config.bam.repository.path }}/builddir"
    cd "{{ config.bam.repository.path }}/builddir"; cmake ..
    cd "{{ config.bam.repository.path }}/builddir"; make install
    cd "{{ config.bam.repository.path }}/builddir/module"; make

- name: xnvme
  run: |
    chmod +x  "{{ config.xnvme.repository.path }}/toolbox/pkgs/ubuntu-oracular.sh"
    cd "{{ config.xnvme.repository.path }}"; ./toolbox/pkgs/ubuntu-oracular.sh
    rm -r "{{ config.xnvme.repository.path }}/builddir" || true
    mkdir -p "{{ config.xnvme.repository.path }}/builddir"
    cd "{{ config.xnvme.repository.path }}"; meson setup builddir
    cd "{{ config.xnvme.repository.path }}"; meson install -C builddir

- name: xal
  run: |
    apt-get install -fy xfslibs-dev
    rm -r "{{ config.xal.repository.path }}/builddir" || true
    mkdir -p "{{ config.xal.repository.path }}/builddir"
    cd "{{ config.xal.repository.path }}"; meson setup builddir
    cd "{{ config.xal.repository.path }}"; meson install -C builddir

- name: sil
  run: |
    rm -r "{{ config.sil.repository.path }}/builddir" || true
    mkdir -p "{{ config.sil.repository.path }}/builddir"
    cd "{{ config.sil.repository.path }}"; meson setup builddir
    cd "{{ config.sil.repository.path }}"; meson install -C builddir

- name: upcie
  run: |
    rm -r "{{ config.upcie.repository.path }}/builddir" || true
    mkdir -p "{{ config.upcie.repository.path }}/builddir"
    cd "{{ config.upcie.repository.path }}"; meson setup builddir
    cd "{{ config.upcie.repository.path }}"; meson install -C builddir
