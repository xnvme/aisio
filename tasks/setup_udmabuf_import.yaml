doc: |
  Install Custom Kernel with UDMABUF import patches
  =================================================

  This adds dma-buf importer functionality to UDMABUF and the ability to share
  physical addresses, from the dma-buf, with userspace.

  CONFIG_UDMABUF=y on Ubuntu, so the importer ioctls (UDMABUF_ATTACH /
  UDMABUF_GET_MAP) cannot live in a module; the in-tree udmabuf is patched and
  the kernel rebuilt on top of the linux-source matching the running kernel.
  Headers are installed before the image so an out-of-tree DKMS module (e.g. the
  NVIDIA driver) rebuilds for the new kernel. The matching linux-libc-dev is
  installed too, so /usr/include/linux/udmabuf.h gains the importer ioctls that
  user-space DMA-buf importers build against. It builds a removable .deb
  (dpkg -r) and reboots into the patched kernel.

  This can be run with::

    cijoe --monitor \
      -c configs/transport.toml \
      -c configs/udmabuf_import.toml \
      tasks/setup_udmabuf_import.yaml

  Adjust transport.toml with the hostname and ssh-login info of the root user.
  Adjust udmabuf_import.toml with the path to your aisio github repository on the host.

  Verified on Ubuntu 26.04 / kernel 7.0 (the 6.8-era patch applies with
  offsets); the prior 6.8 build is preserved at the ``pit-30-06-2026`` tag.

  NOTE: cijoe runs each 'run:' line in a fresh shell, so 'cd' does not persist;
  use -C / absolute paths / single-line '&&' chains.

steps:
- name: fetch_sources
  uses: core.repository_prep

- name: install_dependencies
  run: |
    apt-get -qy update
    DEBIAN_FRONTEND=noninteractive apt-get -qy install {{ config.linux.source.pkg }} build-essential fakeroot debhelper bison flex libssl-dev libelf-dev libdw-dev libncurses-dev libpci-dev bc dwarves rsync kmod cpio clang llvm

- name: extract
  run: |
    # The meta 'linux-source' pkg drops the tarball in /usr/src/ as
    # linux-source-<ver>.tar.* (the pkg name is not a versioned dir), so glob it
    # and extract to a neutral build dir instead of unpacking in place.
    rm -rf /usr/src/ksrc && mkdir -p /usr/src/ksrc
    tar -C /usr/src/ksrc --strip-components=1 -xaf /usr/src/{{ config.linux.source.pkg }}-*.tar.*
    test -f /usr/src/ksrc/drivers/dma-buf/udmabuf.c && echo "source extracted"

- name: apply_patch
  run: |
    git -C /usr/src/ksrc apply --check -v {{ config.udmabuf.repository.path }}/patches/{{ config.udmabuf.patch.name }}
    git -C /usr/src/ksrc apply {{ config.udmabuf.repository.path }}/patches/{{ config.udmabuf.patch.name }}
    grep -q UDMABUF_ATTACH /usr/src/ksrc/include/uapi/linux/udmabuf.h && echo "patch applied"

- name: configure
  run: |
    cp /boot/config-$(uname -r) /usr/src/ksrc/.config
    cd /usr/src/ksrc && scripts/config --disable DEBUG_INFO_NONE --enable DEBUG_INFO_DWARF4 --disable DEBUG_INFO_REDUCED --enable DEBUG_INFO_BTF --disable MODULE_SIG --disable LOCALVERSION_AUTO --set-str LOCALVERSION "-dmabuf" --set-str SYSTEM_TRUSTED_KEYS "" --set-str SYSTEM_REVOCATION_KEYS ""
    make -C /usr/src/ksrc olddefconfig

- name: package
  run: |
    # resolute's debhelper provides no compat-12 (the kernel tree's hardcoded
    # default); bump the generated control to a level it does provide.
    sed -i "s/debhelper-compat (= 12)/debhelper-compat (= 13)/" /usr/src/ksrc/scripts/package/mkdebian
    make -C /usr/src/ksrc -j"$(nproc)" bindeb-pkg

- name: install
  run: |
    # Headers first so the image postinst's DKMS autoinstall has a build tree to
    # compile out-of-tree modules against (e.g. the NVIDIA driver); then the
    # image. linux-libc-dev carries the patched userspace UAPI, so
    # /usr/include/linux/udmabuf.h gains the importer ioctls (UDMABUF_ATTACH /
    # UDMABUF_GET_MAP) that user-space DMA-buf importers build against. Skip the
    # -dbg package emitted by DEBUG_INFO/BTF. Tolerate a kernel-incompatible DKMS
    # module; guarantee a bootable image and grub entry regardless.
    dpkg -i /usr/src/linux-headers-*dmabuf*.deb || true
    dpkg -i /usr/src/linux-libc-dev_*.deb || true
    dpkg -i $(ls /usr/src/linux-image-*dmabuf*.deb | grep -v -- '-dbg') || true
    kver=$(make -C /usr/src/ksrc -s kernelrelease) && { update-initramfs -c -k "$kver" 2>/dev/null || update-initramfs -u -k "$kver"; }
    update-grub

- name: reboot
  run: shutdown -r now

- name: wait_down
  uses: core.wait_for_transport
  with:
    state: down
    timeout: 90

- name: wait_up
  uses: core.wait_for_transport
  with:
    state: up
    timeout: 300

- name: install_cpupower
  run: |
    make -C /usr/src/ksrc tools/cpupower_install prefix=/usr libdir=/usr/lib

- name: install_bpftool
  run: |
    make -C /usr/src/ksrc/tools/bpf/bpftool install prefix=/usr
