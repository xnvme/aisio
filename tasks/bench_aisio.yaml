doc: |
  Run SIL benchmarks to evaluate AiSIO performance
  ================================================

  The benchmark includes:
  - reading 3 different datasets: filesize8gib, tiktokish, imagenetish,
  - performing synthetic randread benchmarks for: upcie, upcie-cuda

  This requires the device to be bound to `uio_pci_generic`, which can be done in the following way:
  - Unmount if needed: `umount /mnt/datasets`
  - `devbind --device '0000:01:00.0' --bind uio_pci_generic`

  `device` should be adjusted to target the correct SSD.
  `batch_size` and `batches` are appropriate for a H100 GPU, and should be adjusted according to hardware.

  This assumes you already ran the tasks 'setup_aisio.yaml' and 'setup_dataset.yaml'


steps:
- name: filesize8gib
  uses: sil
  with:
    backend: "aisio-cpu"
    dataset: "filesize8gib"
    device: "{{ config.filesystems.dset.pci_addr }}"
    batch_size: 1
    batches: 1

- name: tiktokish
  uses: sil
  with:
    backend: "aisio-cpu"
    dataset: "tiktokish"
    device: "{{ config.filesystems.dset.pci_addr }}"
    batch_size: 26
    batches: 1


- name: imagenetish
  uses: sil
  with:
    backend: "aisio-cpu"
    dataset: "imagenetish"
    device: "{{ config.filesystems.dset.pci_addr }}"
    batch_size: 4096
    batches: 300

- name: upcie
  uses: xnvmeperf
  with:
    backend: "upcie"
    devices: ["{{ config.filesystems.dset.pci_addr }}"]
    runtime: 10
    iosize: 512
    iopattern: randread

- name: upcie-cuda
  uses: xnvmeperf
  with:
    backend: "upcie-cuda"
    devices: ["{{ config.filesystems.dset.pci_addr }}"]
    runtime: 10
    iosize: 512
    iopattern: randread
