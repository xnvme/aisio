name: Build and deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, but don't cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install pipx and docs tooling
        env:
          PIPX_HOME: /home/runner/.local/share/pipx
          PIPX_BIN_DIR: /home/runner/.local/bin
        run: |
          python -m pip install --upgrade pip pipx
          python -m pipx install ./docs/tooling
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build HTML
        run: aisio-docs-build-html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
