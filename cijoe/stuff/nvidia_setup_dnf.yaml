doc: |
  Setup NVIDIA open-source kernel modules and CUDA
  ================================================

  * NVIDIA Modules: nvidia, nvidia-uvm, nvidia-peermem
  * NVIDIA CUDA: 12.9 without support for GDS (nvidia-fs)
  
  Assumptions
  -----------

  * ssh root access
  * Linux distribution with the apt package manager
  * x86_64 -- note: this could easily be parametrized via cijoe-config.toml

  Caveat
  ------

  You probably need to manually uninstall / blacklist Nouveau.
  
  Seems like "nvidia-fs" only works with old kernels e.g. 5.15 and lower.

  CUDA is not installed into standard locations for PATH and LD_LIBRARY_PATH,
  thus these environment variables must be setup manually. An interactive setup
  is added in "/etc/profile.d/cuda.sh", however, for non-interactive, then this
  does nothing.
  
steps:
- name: prereqs
  run: |
    dnf5 install -y @development-tools
    dnf install -y kernel-devel kernel-headers elfutils-libelf-devel dkms git wget tar zstd make gcc perl

- name: gsp_download
  run: |
    test -f /tmp/gsp.run || wget -O /tmp/gsp.run "{{ config.nvidia.gsp.url }}"
    ls -lha /tmp/gsp.run
    md5sum /tmp/gsp.run

- name: gsp_extract
  run: |
    chmod +x /tmp/gsp.run
    [ -d /tmp/gsp ] || /tmp/gsp.run --extract-only --target /tmp/gsp
    find gsp

- name: gsp_install
  run: |
    mkdir -p /lib/firmware/nvidia/ga102/
    cp /tmp/gsp/firmware/gsp_ga10x.bin /lib/firmware/nvidia/ga102/gsp.bin
    restorecon /lib/firmware/nvidia/ga102/gsp.bin
    dracut -f

- name: clone
  run: |
    test -d {{ config.nvidia.modules.repository.path }} || git clone "{{ config.nvidia.modules.repository.remote }}" {{ config.nvidia.modules.repository.path }}
    cd {{ config.nvidia.modules.repository.path }}; git checkout "{{ config.nvidia.modules.repository.tag }}"

- name: modules_build
  run: |
    cd {{ config.nvidia.modules.repository.path }}; make modules -j "$(nproc)"

- name: modules_install
  run: |
    cd {{ config.nvidia.modules.repository.path }}; make modules_install
    depmod

- name: modules_config
  run: |
    echo "options nvidia nvreg_openrmenableunsupportedgpus=1" | tee -a /etc/modprobe.d/nvidia.conf
    echo "nvidia" | tee -a /etc/modules-load.d/nvidia.conf
    echo "nvidia-uvm" | tee -a /etc/modules-load.d/nvidia.conf
    echo "nvidia-peermem" | tee -a /etc/modules-load.d/nvidia.conf
    update-initramfs -u

- name: modprobe
  run: |
    modprobe nvidia NVreg_OpenRmEnableUnsupportedGpus=1
    modprobe nvidia-uvm
    modprobe nvidia-peermem

#- name: cuda
#  run: |
#    test -f /tmp/cuda.deb || wget -O /tmp/cuda.deb "{{ config.nvidia.cuda.url}}"
#    ls -lha /tmp/cuda.deb
#    md5sum /tmp/cuda.deb
#    dpkg -i /tmp/cuda.deb
#    apt-get update
#    apt-get install cuda-toolkit-12-9

- name: cuda
  run: |
    test -f /tmp/cuda.run || wget -O /tmp/cuda.run "{{ config.nvidia.cuda.url}}"
    ls -lha /tmp/cuda.run
    md5sum /tmp/cuda.run
    chmod +x /tmp/cuda.run
    /tmp/cuda.run --toolkit --silent

- name: cuda_profile
  run: |
    echo '# CUDA environment variables (set by setup script)' | tee /etc/profile.d/cuda.sh
    echo 'export PATH=/usr/local/cuda/bin:$PATH' | tee -a /etc/profile.d/cuda.sh
    echo 'export LD_LIBRARY_PATH=/usr/local/cuda/lib64:$LD_LIBRARY_PATH' | tee -a /etc/profile.d/cuda.sh
    chmod +x /etc/profile.d/cuda.sh

- name: verification
  run: |
    modinfo nvidia | grep version
    lsmod | grep nvidia
    nvcc --version || true
    nvidia-smi || true
